name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting (gofmt)
        run: |
          files="$(find . -name '*.go' -not -path './vendor/*')"
          if [ -n "$files" ]; then
            bad="$(gofmt -l $files)"
            if [ -n "$bad" ]; then
              echo "gofmt needed for:"
              echo "$bad"
              exit 1
            fi
          fi

      - name: Vet Go code
        run: go vet ./...

      - name: Run backend tests
        run: go test ./... -count=1

      - name: Per-function slog audit (funclogmeasure)
        run: go run ./cmd/funclogmeasure -enforce

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Run web tests
        run: npm test -- --run
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web
