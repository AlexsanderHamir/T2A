<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- theme-color must stay literal hex: <meta> cannot use CSS variables. Values mirror --bg-page in web/src/app/styles/app-design-tokens.css (:root light + prefers-color-scheme: dark). -->
    <meta name="theme-color" content="#f9f9f8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Hamix is a control plane for agent-heavy workflows. Web UI for tasks, audit trail, and live updates over SSE."
    />
    <title>Hamix — Tasks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
