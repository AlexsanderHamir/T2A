# Hamix local dev — toolchain in Docker; DATABASE_URL from repo-root .env.
# Build: ./scripts/docker-build.sh   Start: docker compose up
services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - dev_node_modules:/app/web/node_modules
      - go_mod_cache:/go/pkg/mod
    ports:
      - "8080:8080"
      - "5173:5173"
    entrypoint: ["/bin/bash", "/app/docker/dev-entrypoint.sh"]
    command: ["./scripts/dev.sh", "--host", "0.0.0.0", "--vite-host", "0.0.0.0"]

volumes:
  dev_node_modules:
  go_mod_cache:
